<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lightcore</title>
    <!-- wasm-opt disabled: trunk's bundled wasm-opt rejects modern wasm features the current Rust
         toolchain emits by default (bulk-memory `memory.copy`, nontrapping `i32.trunc_sat`), and
         with the `wasm-release` profile (opt-level="s") it saves ~nothing here. Without this,
         `trunk build --release` fails at the wasm-opt step. -->
    <link data-trunk rel="rust" href="Cargo.toml" data-bin="lightcore_bin" data-wasm-opt="0" />
    <link data-trunk rel="icon" href="assets/favicon.png" />
    <script>
      (function() {
        const audioContexts = [];
        const OriginalAudioContext = window.AudioContext || window.webkitAudioContext;
        if (OriginalAudioContext) {
          window.AudioContext = class extends OriginalAudioContext {
            constructor(...args) {
              super(...args);
              audioContexts.push(this);
            }
          };
          if (window.webkitAudioContext) {
            window.webkitAudioContext = window.AudioContext;
          }
        }
        function resumeAudio() {
          audioContexts.forEach(ctx => {
            if (ctx.state === 'suspended') {
              ctx.resume().then(() => {
                console.log("AudioContext reactivado con éxito.");
              }).catch(err => {
                console.error("Error al reactivar el AudioContext:", err);
              });
            }
          });
        }
        window.addEventListener('click', resumeAudio);
        window.addEventListener('keydown', resumeAudio);
        window.addEventListener('touchstart', resumeAudio);
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #010102;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        outline: none;
      }
    </style>
  </head>
  <body>
  </body>
</html>
